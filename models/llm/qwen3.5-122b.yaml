model: qwen3.5:122b
label:
  en_US: Qwen 3.5 122B
  zh_Hans: Qwen 3.5 122B
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 131072
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 65536
  - name: response_format
    use_template: response_format
pricing:
  input: "150"
  output: "1200"
  unit: "0.000001"
  currency: credits
